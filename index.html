<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Rise Entertainment | Official</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; }
        
        /* Navigation */
        nav { display: flex; justify-content: center; align-items: center; padding: 15px; background: #000; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .logo-img { height: 80px; width: auto; object-fit: contain; }

        /* Hero Section */
        .hero { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), #050505), url('https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&w=1000&q=80'); background-size: cover; }
        .hero h1 { font-size: 2.5rem; letter-spacing: 8px; margin-bottom: 10px; text-transform: uppercase; }
        .hero p { color: #f39c12; letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; font-weight: bold; }

        /* Artists Section */
        .section { padding: 50px 8%; text-align: center; }
        .section-title { font-size: 1.5rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; border-bottom: 2px solid #f39c12; display: inline-block; padding-bottom: 10px; }
        .artist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .artist-card { background: #111; padding: 30px; border-radius: 8px; border: 1px solid #222; transition: 0.3s; }
        .artist-card:hover { border-color: #f39c12; }
        .artist-card h3 { font-size: 1.2rem; color: #fff; margin-bottom: 10px; }
        .artist-card p { color: #f39c12; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        footer { padding: 40px; text-align: center; background: #000; color: #555; font-size: 0.7rem; border-top: 1px solid #111; letter-spacing: 1px; }
    </style>
</head>
<body>

    <nav>
        <img src="https://raw.githubusercontent.com/rhythmrisecompany1-ux/Rhythmrise.ent/main/1000002849.jpg" alt="Rhythm Rise Logo" class="logo-img">
    </nav>

    <div class="hero">
        <h1>RHYTHM RISE</h1>
        <p>Independent Record Label | Myanmar</p>
    </div>

    <section class="section">
        <h2 class="section-title">Current Artists</h2>
        <div class="artist-grid">
            <div class="artist-card">
                <h3>Nyeimn Chamn Co.</h3>
                <p>Artist</p>
            </div>
            <div class="artist-card">
                <h3>Ei Myat Cho</h3>
                <p>Artist</p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 RHYTHM RISE ENTERTAINMENT. DIRECTED BY KUB.</p>
    </footer>

</body>
</html>
