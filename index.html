<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Rise Entertainment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        
        /* Header */
        header { padding: 20px; text-align: center; background: #111; border-bottom: 2px solid #f39c12; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 3px; color: #f39c12; }

        /* Hero Section */
        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1514525253361-bee8718a300a?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwxfDB8MXxyYW5kb218fHx8fHx8fHwxNjI0MTI2NDU3&ixlib=rb-1.2.1&q=80&w=1080'); background-size: cover; text-align: center; padding: 20px; }
        .hero h1 { font-size: 40px; margin-bottom: 10px; }

        /* Artist List */
        .artists { padding: 40px 20px; text-align: center; }
        .artist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 20px; }
        .artist-card { background: #222; padding: 20px; border-radius: 10px; }
        .artist-card h3 { color: #f39c12; }

        footer { padding: 30px; text-align: center; font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <header>
        <div class="logo">RHYTHM RISE</div>
    </header>

    <div class="hero">
        <h1>Rhythm Rise</h1>
        <p>Independent Record Label | Myanmar</p>
    </div>

    <section class="artists">
        <h2>OUR ARTISTS</h2>
        <div class="artist-grid">
            <div class="artist-card"><h3>Phyo Pyae Sone</h3></div>
            <div class="artist-card"><h3>Jewel</h3></div>
            <div class="artist-card"><h3>Ei Myat Cho</h3></div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Rhythm Rise Entertainment. Produced by Kub.</p>
    </footer>

</body>
</html>
